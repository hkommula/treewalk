<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UOW Tree Walk</title>
    <meta
      name="description"
      content="Lightweight tree walk map with OSM walkway routing and live location tracking."
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <main class="layout">
        <section class="map-panel" aria-label="Map">
          <div class="map-control-group" id="map-control-group" aria-label="Map tools">
            <button
              id="map-controls-toggle"
              type="button"
              class="map-tool map-tool-toggle"
              aria-label="Toggle map tools"
              aria-expanded="false"
              title="Toggle map tools"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg>
            </button>
            <div class="map-control-stack" id="map-control-stack">
              <button id="home-btn" type="button" class="map-tool" aria-label="Home view" title="Home view">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.5 12 5l8 6.5v7a1 1 0 0 1-1 1h-4.5v-5h-5v5H5a1 1 0 0 1-1-1z"/></svg>
              </button>
              <button id="locate-btn" type="button" class="map-tool" aria-label="Locate me" title="Locate me">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 2h2v3.1a7 7 0 0 1 5.9 5.9H22v2h-3.1a7 7 0 0 1-5.9 5.9V22h-2v-3.1a7 7 0 0 1-5.9-5.9H2v-2h3.1A7 7 0 0 1 11 5.1zm1 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10m0 3a2 2 0 1 1 0 4 2 2 0 0 1 0-4"/></svg>
              </button>
              <button id="reset-visited-btn" type="button" class="map-tool" aria-label="Reset visited trees" title="Reset visited trees">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7"/></svg>
              </button>
              <button id="zoom-in-btn" type="button" class="map-tool" aria-label="Zoom in" title="Zoom in">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z"/></svg>
              </button>
              <button id="zoom-out-btn" type="button" class="map-tool" aria-label="Zoom out" title="Zoom out">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 11h14v2H5z"/></svg>
              </button>
            </div>
          </div>

          <div id="map" class="map" role="application" aria-label="Tree walk map"></div>

          <button type="button" class="tour-restore-btn" id="tour-restore-btn" hidden aria-label="Open tour panel" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m10 6 6 6-6 6"/></svg>
            <span>Tour</span>
          </button>

          <aside class="sidebar">
            <section class="panel tour-panel collapsible-panel" id="tour-panel">
              <div class="collapsible-summary">
                <div>
                  <h2>Tour</h2>
                </div>
                <div class="tour-head-actions">
                  <span class="small-chip status-chip" id="status-chip">Loading</span>
                  <button id="reset-visited-inline-btn" type="button" class="small-action" aria-label="Reset visited trees">Reset</button>
                  <button id="tour-collapse-btn" type="button" class="small-action" aria-label="Collapse tour panel">
                    <span aria-hidden="true">&#8964;</span>
                  </button>
                </div>
              </div>
              <div class="collapsible-body">
                <div class="tour-summary-group">
                  <div class="next-guide">
                    <div class="next-guide-primary">
                      <span class="guide-label">Next tree</span>
                      <strong id="next-tree-name">Waiting for route</strong>
                    </div>
                    <div class="next-guide-meta">
                      <article>
                        <span>Distance</span>
                        <strong id="next-tree-distance">-</strong>
                      </article>
                    </div>
                  </div>

                  <dl class="metric-grid compact-metrics">
                    <div>
                      <dt>Trees</dt>
                      <dd id="tree-count">0</dd>
                    </div>
                    <div>
                      <dt>Done</dt>
                      <dd id="arrived-count">0</dd>
                    </div>
                    <div>
                      <dt>Route</dt>
                      <dd id="route-distance">-</dd>
                    </div>
                    <div>
                      <dt>Time</dt>
                      <dd id="route-time">-</dd>
                    </div>
                  </dl>

                  <p class="muted" id="gps-readout">No live GPS fix yet.</p>
                  <p class="error" id="error-text" hidden></p>
                </div>

                <div class="panel-head route-head">
                  <h3>Route Stops</h3>
                  <span class="small-chip" id="route-count">0 stops</span>
                </div>
                <div class="route-list-wrap">
                  <ol id="route-list" class="route-list">
                    <li class="empty-state">Use Locate Me or tap the map to generate the tour.</li>
                  </ol>
                </div>
              </div>
            </section>

            <section class="panel tree-panel" id="tree-panel" hidden>
              <div class="tree-panel-head">
                <h2>Selected Tree</h2>
                <button type="button" class="small-action tree-panel-back" id="tree-panel-back-btn">
                  <span aria-hidden="true">&#8592;</span>
                  <span>Go back to tour</span>
                </button>
              </div>
              <div class="tree-panel-body">
                <div id="tree-detail" class="tree-detail">
                  <p class="empty-state">Select a tree marker or route stop to view details.</p>
                </div>
              </div>
            </section>
          </aside>
        </section>
      </main>
    </div>
    <div class="image-lightbox" id="image-lightbox" hidden aria-hidden="true">
      <button type="button" class="image-lightbox-backdrop" id="image-lightbox-close" aria-label="Close image"></button>
      <div class="image-lightbox-sheet" role="dialog" aria-modal="true" aria-labelledby="image-lightbox-title">
        <div class="image-lightbox-head">
          <strong id="image-lightbox-title">Tree image</strong>
          <button type="button" class="image-lightbox-dismiss" id="image-lightbox-dismiss" aria-label="Close image">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7.4 6 4.6 4.6L16.6 6 18 7.4 13.4 12 18 16.6 16.6 18 12 13.4 7.4 18 6 16.6 10.6 12 6 7.4z"/></svg>
          </button>
        </div>
        <img id="image-lightbox-image" alt="" />
      </div>
    </div>

    <script>
      if (window.location.protocol === "file:") {
        document.body.innerHTML =
          '<main class="file-warning"><h1>Local server required</h1><p>Open this app through http://localhost so fetch(), ES modules, and geolocation work correctly.</p></main>';
      }
    </script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
